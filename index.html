<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maps URL Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --border: #ddd9d0;
      --text: #1a1916;
      --muted: #7a7670;
      --accent: #c8441a;
      --green: #1d6e4a;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }

    .logo-icon { width: 36px; height: 36px; }

    h1 {
      font-size: 1.75rem;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      margin-top: 0.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    /* detection badge above textarea */
    .detect-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
      min-height: 22px;
    }

    .field-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 9px 2px 6px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(-3px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .badge.visible { opacity: 1; transform: translateY(0); }
    .badge-apple { background: #e8f0fe; color: #1a1916; }
    .badge-google { background: #e6f4ea; color: #1a1916; }

    .badge svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* input row */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .input-row textarea { flex: 1; }

    textarea {
      width: 100%;
      min-height: 88px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      resize: vertical;
      transition: border-color 0.15s, background 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface);
    }

    textarea[readonly] {
      cursor: default;
      color: var(--green);
    }

    .paste-btn {
      flex-shrink: 0;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
      height: 88px;
      width: 64px;
    }

    .paste-btn:hover { background: var(--border); color: var(--text); }
    .paste-btn svg { width: 18px; height: 18px; }
    .paste-btn span { font-size: 0.7rem; letter-spacing: 0.02em; }

    /* output */
    #output-section {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #output-section.visible {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* converted-to label with logo */
    .converted-label-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 0.5rem;
    }

    .converted-label-row svg { width: 15px; height: 15px; flex-shrink: 0; }

    .output-wrapper { position: relative; }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 4px 10px;
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .copy-btn:hover { color: var(--text); border-color: var(--text); }
    .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* open buttons */
    .action-row {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
    }

    .open-btn {
      flex: 1;
      padding: 11px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }

    .open-btn:hover { background: var(--surface2); border-color: #c4c0b8; }
    .open-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .open-btn.primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .open-btn.primary:hover { opacity: 0.85; background: var(--text); }

    /* error */
    .error-box {
      display: none;
      margin-top: 1rem;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 0.82rem;
      color: #991b1b;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="10" fill="#1a1916"/>
      <path d="M18 8C14.13 8 11 11.13 11 15c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 18 12a2.5 2.5 0 0 1 0 5z" fill="white"/>
      <path d="M9 27l4-2 6 2 6-2 4 2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </svg>
    <h1>Maps URL Converter</h1>
  </div>
  <p class="subtitle">Convert directions links between Apple Maps and Google Maps</p>
</header>

<div class="card">
  <div class="detect-row">
    <div class="field-label">Maps URL</div>
    <span class="badge" id="detect-badge"></span>
  </div>
  <div class="input-row">
    <textarea id="input-url" placeholder="Paste an Apple Maps or Google Maps directions link…"></textarea>
    <button class="paste-btn" onclick="pasteFromClipboard()" title="Paste from clipboard">
      <!-- clipboard icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="4" rx="1"/>
        <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>
      </svg>
      <span>Paste</span>
    </button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="output-section">
    <hr class="divider" />

    <div class="converted-label-row">
      <div class="field-label" style="margin-bottom:0" id="output-label">Converted URL</div>
    </div>
    <div class="output-wrapper">
      <textarea id="output-url" readonly></textarea>
      <button class="copy-btn" id="copy-btn" onclick="copyOutput()">Copy</button>
    </div>

    <div class="action-row" id="action-row">
      <!-- populated by JS -->
    </div>
  </div>
</div>

<footer>
  No data is sent anywhere — all conversion happens in your browser.<br>
  &copy; <span id="cy"></span> Joseph Karlan
</footer>

<script>
  document.getElementById('cy').textContent = new Date().getFullYear();

  // SVG logos (inline so no external requests needed)
  const APPLE_LOGO = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;

  const GOOGLE_LOGO = `<svg viewBox="0 0 24 24" fill="none"><path d="M21.35 11.1h-9.17v2.73h6.51c-.33 3.81-3.5 5.44-6.5 5.44C8.36 19.27 5 16.25 5 12c0-4.1 3.2-7.27 7.2-7.27 3.09 0 4.9 1.97 4.9 1.97L19 4.72S16.56 2 12.1 2C6.42 2 2.03 6.8 2.03 12c0 5.05 4.13 10 10.22 10 5.35 0 9.25-3.67 9.25-9.09 0-1.15-.15-1.81-.15-1.81z" fill="#4285F4"/></svg>`;

  const inputEl = document.getElementById('input-url');
  let debounceTimer;

  inputEl.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(tryConvert, 380);
  });
  inputEl.addEventListener('paste', () => {
    clearTimeout(debounceTimer);
    setTimeout(tryConvert, 0);
  });

  async function pasteFromClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      inputEl.value = text;
      clearTimeout(debounceTimer);
      tryConvert();
    } catch {
      inputEl.focus();
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.style.display = 'block';
    hideOutput();
    setDetectBadge(null);
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  function setDetectBadge(type) {
    const badge = document.getElementById('detect-badge');
    if (!type) {
      badge.classList.remove('visible', 'badge-apple', 'badge-google');
      return;
    }
    badge.innerHTML = type === 'apple'
      ? `${APPLE_LOGO} Apple Maps detected`
      : `${GOOGLE_LOGO} Google Maps detected`;
    badge.className = `badge ${type === 'apple' ? 'badge-apple' : 'badge-google'}`;
    requestAnimationFrame(() => requestAnimationFrame(() => badge.classList.add('visible')));
  }

  function parseAppleUrl(url) {
    let params;
    try { params = new URL(url).searchParams; } catch(e) { throw new Error('Invalid URL.'); }
    const source = params.get('source') || params.get('saddr');
    const dest = params.get('destination') || params.get('daddr');
    if (!source || !dest) throw new Error('Could not find source or destination in the Apple Maps URL.');
    const waypoints = params.getAll('waypoint');
    let mode = params.get('mode') || 'driving';
    if (mode === 'r') mode = 'driving';
    if (mode === 'w') mode = 'walking';
    if (mode === 'c') mode = 'cycling';
    return { stops: [source, ...waypoints, dest], mode };
  }

  function parseGoogleUrl(url) {
    const match = url.match(/\/maps\/dir\/([^?#]+)/);
    if (!match) throw new Error('Could not find route in the URL. Make sure it is a /dir/ link.');
    const segments = match[1].split('/').map(s => decodeURIComponent(s.trim())).filter(s => {
      if (!s) return false;
      if (/^@[-\d.,]+$/.test(s)) return false;
      if (/^\d{1,2}z$/.test(s)) return false;
      if (/^data=/.test(s)) return false;
      return true;
    });
    if (segments.length < 2) throw new Error('Found fewer than 2 stops. Make sure the URL includes readable place names.');
    let mode = 'driving';
    if (url.includes('!3e1')) mode = 'walking';
    else if (url.includes('!3e2')) mode = 'bicycling';
    else if (url.includes('!3e3')) mode = 'transit';
    return { stops: segments, mode };
  }

  function buildGoogleUrl(stops, mode) {
    const path = stops.map(s => encodeURIComponent(s)).join('/');
    return `https://www.google.com/maps/dir/${path}/?travelmode=${mode}`;
  }

  function buildAppleUrl(stops, mode) {
    const modeMap = { driving: 'r', walking: 'w', bicycling: 'c', transit: 'pt', cycling: 'c' };
    const appleMode = modeMap[mode] || 'r';
    const origin = stops[0];
    const dest = stops[stops.length - 1];
    const waypoints = stops.slice(1, -1);
    let url = `https://maps.apple.com/directions?source=${encodeURIComponent(origin)}&destination=${encodeURIComponent(dest)}&mode=${appleMode}`;
    waypoints.forEach(w => { url += `&waypoint=${encodeURIComponent(w)}`; });
    return url;
  }

  function showOutput() {
    const el = document.getElementById('output-section');
    el.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  }

  function hideOutput() {
    const el = document.getElementById('output-section');
    el.classList.remove('visible');
    setTimeout(() => { if (!el.classList.contains('visible')) el.style.display = 'none'; }, 300);
  }

  function setActionButtons(appleUrl, googleUrl, sourceType) {
    const row = document.getElementById('action-row');
    // Primary = the converted target; secondary = the original (re-open)
    const convertedIsApple = sourceType === 'google';

    row.innerHTML = `
      <a href="${googleUrl}" target="_blank" rel="noopener" class="open-btn${convertedIsApple ? '' : ' primary'}">
        ${GOOGLE_LOGO} Open in Google Maps
      </a>
      <a href="${appleUrl}" target="_blank" rel="noopener" class="open-btn${convertedIsApple ? ' primary' : ''}">
        ${APPLE_LOGO} Open in Apple Maps
      </a>
    `;
  }

  function tryConvert() {
    hideError();
    const raw = inputEl.value.trim();
    if (!raw) { hideOutput(); setDetectBadge(null); return; }

    const isApple = raw.includes('maps.apple.com');
    const isGoogle = raw.includes('google.com/maps');
    if (!isApple && !isGoogle) { setDetectBadge(null); return; }

    const sourceType = isApple ? 'apple' : 'google';
    setDetectBadge(sourceType);

    try {
      let parsed, appleUrl, googleUrl, outputUrl, outputLabel;

      if (isApple) {
        parsed = parseAppleUrl(raw);
        googleUrl = buildGoogleUrl(parsed.stops, parsed.mode);
        appleUrl = raw; // keep original
        outputUrl = googleUrl;
        outputLabel = 'Google Maps URL';
      } else {
        parsed = parseGoogleUrl(raw);
        appleUrl = buildAppleUrl(parsed.stops, parsed.mode);
        googleUrl = raw; // keep original
        outputUrl = appleUrl;
        outputLabel = 'Apple Maps URL';
      }

      document.getElementById('output-label').textContent = outputLabel;
      document.getElementById('output-url').value = outputUrl;
      setActionButtons(appleUrl, googleUrl, sourceType);
      showOutput();
    } catch(e) {
      showError(e.message);
    }
  }

  function copyOutput() {
    const val = document.getElementById('output-url').value;
    navigator.clipboard.writeText(val).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
    });
  }
</script>
</body>
</html>
