<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maps URL Converter</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='10' fill='%231a1916'/%3E%3Cpath d='M18 8C14.13 8 11 11.13 11 15c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 18 12a2.5 2.5 0 0 1 0 5z' fill='white'/%3E%3Cpath d='M9 27l4-2 6 2 6-2 4 2' stroke='white' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round' opacity='0.5'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --surface2: #f0ede6;
      --border: #ddd9d0;
      --text: #1a1916;
      --muted: #7a7670;
      --accent: #c8441a;
      --green: #1d6e4a;
      --amber: #9a6200;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 5rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 0.5rem;
    }

    .logo-icon { width: 36px; height: 36px; }
    h1 { font-size: 1.75rem; font-weight: 500; letter-spacing: -0.03em; }
    .subtitle { color: var(--muted); font-size: 0.9rem; font-weight: 300; margin-top: 0.25rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 600px;
    }

    /* shared banner */
    .shared-banner {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      font-size: 0.82rem;
      color: var(--green);
    }
    .shared-banner.visible { display: flex; }
    .shared-banner svg { width: 15px; height: 15px; flex-shrink: 0; }
    .shared-banner.visible { margin-bottom: 1.25rem; }

    /* main input textarea */
    .input-wrap {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .textarea-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    .input-corner-spinner {
      display: none;
      position: absolute;
      top: 8px;
      right: 10px;
      width: 12px;
      height: 12px;
      border: 1.8px solid var(--muted);
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      opacity: 0.9;
      pointer-events: none;
      z-index: 2;
    }
    .input-corner-spinner.visible { display: block; }

    .input-wrap textarea {
      flex: 1;
      height: 88px;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text);
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      resize: none;
      transition: border-color 0.15s, background 0.15s;
      outline: none;
      width: 100%;
    }

    .input-wrap textarea:focus { border-color: var(--accent); background: var(--surface); }
    .input-wrap textarea::placeholder { color: #b0aca5; }

    /* compact url strip — shown after conversion */
    .url-strip {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .url-strip.apple  { border-color: #b8c8e8; }
    .url-strip.google { border-color: #a8d5b5; }

    .url-strip-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      transition: background 0.2s;
    }

    .url-strip.apple  .url-strip-header { background: #eef3fb; border-color: #b8c8e8; color: var(--text); }
    .url-strip.google .url-strip-header { background: #eef6f0; border-color: #a8d5b5; color: var(--text); }
    .url-strip-header img, .url-strip-header svg { width: 13px; height: 13px; flex-shrink: 0; }

    .url-strip-body {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      background: var(--surface);
    }

    .url-strip-text {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      cursor: default;
      user-select: all;
    }

    .url-strip-copy {
      flex-shrink: 0;
      padding: 3px 10px;
      font-family: var(--sans);
      font-size: 0.68rem;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .url-strip-copy:hover { color: var(--text); border-color: var(--text); }
    .url-strip-copy.copied { color: var(--green); border-color: var(--green); }

    /* paste button */
    .input-wrap .paste-btn { align-self: stretch; }

    .paste-btn {
      flex-shrink: 0;
      width: 56px;
      height: 88px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface2);
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: all 0.15s;
    }

    .paste-btn:hover { background: var(--border); color: var(--text); }
    .paste-btn svg { width: 17px; height: 17px; }

    /* arrow between boxes */
    .convert-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      color: var(--border);
      margin: 4px 0;
    }

    .convert-arrow svg { width: 18px; height: 18px; }

    /* output section */
    #output-section {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #output-section.visible { display: block; opacity: 1; transform: translateY(0); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

    /* map cards */
    .map-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 1.25rem;
    }

    .map-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      transition: box-shadow 0.15s, border-color 0.15s;
    }

    .map-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.1); border-color: #c4c0b8; }

    .map-card-logo {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-card-logo.apple  { background: #000; }
    .map-card-logo.google { background: #fff; border: 1px solid var(--border); }
    .map-card-logo img, .map-card-logo svg { width: 16px; height: 16px; }

    .map-card-url {
      flex: 1;
      min-width: 0;
      position: relative;
    }

    .map-card-platform {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .map-card-link {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      display: block;
      mask-image: linear-gradient(to right, black 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, black 60%, transparent 100%);
    }

    .map-card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .map-card-btn {
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      font-family: var(--sans);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .map-card-btn:hover { background: var(--border); }
    .map-card-btn.copied { color: var(--green); border-color: var(--green); }
    .map-card-btn svg { width: 11px; height: 11px; opacity: 0.6; }

    /* convert another */
    .convert-another-btn {
      display: block;
      margin: 1.5rem auto 0;
      padding: 0;
      border: none;
      background: none;
      font-family: var(--sans);
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }

    .convert-another-btn:hover { color: var(--text); }

    /* share strip */
    .share-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 1rem;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .share-strip-label { font-size: 0.78rem; color: var(--muted); flex: 1; }

    .share-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .share-btn:hover { background: var(--border); }
    .share-btn.copied { color: var(--green); border-color: var(--green); }
    .share-btn svg { width: 13px; height: 13px; }

    /* route rail */
    .route-rail {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 14px 14px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, #fdfcf9 0%, #f7f4ee 100%);
    }

    .rail-row {
      display: flex;
      align-items: stretch;
      gap: 12px;
    }

    /* left track column */
    .rail-track,
    .rail-stops-track {
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      width: 16px;
      flex-shrink: 0;
      min-height: 38px;
    }

    .rail-dot,
    .rail-node {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
      grid-row: 2;
    }

    .rail-node {
      width: 2px;
      background: var(--border);
      border-radius: 999px;
    }

    .rail-dot.origin { background: var(--green); }
    .rail-dot.dest   { background: var(--green); }
    .rail-dot.via    { background: var(--amber); }

    .rail-line {
      width: 2px;
      background: var(--border);
      min-height: 8px;
      height: 100%;
    }

    .rail-line.top { grid-row: 1; }
    .rail-line.bottom { grid-row: 3; }
    .rail-line.hidden { visibility: hidden; }

    /* stop content */
    .rail-content {
      flex: 1;
      min-width: 0;
      padding: 0 0 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .rail-content.last { padding-bottom: 0; }
    .rail-content.no-pad { padding-bottom: 0; }

    .rail-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1px;
    }

    .rail-name {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
    }

    /* stops pill — sits in the track between origin and dest */
    .rail-stops-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 0;
      max-height: 28px;
    }

    .rail-stops-pill {
      display: inline-flex;
      align-items: center;
      align-self: center;
      gap: 4px;
      padding: 1px 8px 1px 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      margin: 0;
    }

    .rail-stops-pill:hover { background: var(--border); color: var(--text); }

    .rail-remove-btn {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      padding: 0;
      transition: background 0.12s, color 0.12s;
      align-self: center;
    }
    .rail-remove-btn:hover { background: #fde8e0; color: #9c2f10; }
    .rail-remove-btn svg { width: 12px; height: 12px; }

    .rail-stops-pill svg {
      width: 10px;
      height: 10px;
      transition: transform 0.2s;
    }

    .rail-stops-pill.open svg { transform: rotate(180deg); }

    .rail-waypoints {
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
    }

    .rail-waypoints.open {
      max-height: 2000px;
      opacity: 1;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease 0.05s;
    }

    .rail-waypoints .rail-content { padding-bottom: 10px; }

    @media (max-width: 640px) {
      body { padding: 1.5rem 0.9rem 3rem; }
      .card { padding: 1rem; border-radius: 14px; }
      .input-wrap { flex-direction: column; }
      .paste-btn {
        width: 100%;
        height: 88px;
        flex-direction: row;
        border-radius: 10px;
      }
      .route-rail { padding: 12px 10px 10px; }
      .rail-name { font-size: 0.82rem; }
      .rail-stops-pill { font-size: 0.68rem; padding: 4px 8px; }
      .share-strip {
        flex-direction: column;
        align-items: stretch;
      }
      .share-btn {
        justify-content: center;
      }
    }

    /* redirect hint */
    .redirect-box {
      display: none;
      margin-top: 1rem;
      padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--muted);
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .redirect-box.visible { display: flex; }
    .redirect-box svg { width: 15px; height: 15px; flex-shrink: 0; }
    .redirect-box-text { flex: 1; }
    .redirect-spinner {
      display: none;
      position: absolute;
      top: 8px;
      right: 8px;
      width: 12px;
      height: 12px;
      border: 1.8px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      opacity: 0.8;
    }
    .redirect-spinner.visible { display: block; }

    .error-box {
      display: none;
      margin-top: 1rem;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 0.82rem;
      color: #991b1b;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-row">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="10" fill="#1a1916"/>
      <path d="M18 8C14.13 8 11 11.13 11 15c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 18 12a2.5 2.5 0 0 1 0 5z" fill="white"/>
      <path d="M9 27l4-2 6 2 6-2 4 2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </svg>
    <h1>Maps URL Converter</h1>
  </div>
  <p class="subtitle">Convert directions links between Apple Maps and Google Maps</p>
</header>

<div class="card">
  <div class="shared-banner" id="shared-banner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    Someone shared this route with you
  </div>

  <!-- input -->
  <div class="input-wrap">
    <div class="textarea-wrap">
      <textarea id="input-url" placeholder="Paste an Apple Maps or Google Maps directions link…"></textarea>
      <span class="input-corner-spinner" id="input-corner-spinner" aria-hidden="true"></span>
    </div>
    <button class="paste-btn" onclick="pasteFromClipboard()" title="Paste from clipboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="4" rx="1"/>
        <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>
      </svg>
      <span>Paste</span>
    </button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="output-section">
    <!-- route summary -->
    <div class="route-rail" id="route-rail"></div>

    <hr class="divider" />

    <!-- map cards -->
    <div class="map-cards" id="map-cards">
      <!-- populated by JS -->
    </div>

    <!-- share + convert another -->
    <div class="share-strip" style="margin-top:1rem">
      <span class="share-strip-label">Share this route with anyone</span>
      <button class="share-btn" id="share-btn" onclick="shareRoute()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Copy share link
      </button>
    </div>

    <button class="convert-another-btn" onclick="resetAll()">Convert a different link</button>

  </div>
</div>

<footer>
  No data is sent anywhere — all conversion happens in your browser.<br>
  &copy; <span id="cy"></span> Joseph Karlan
</footer>

<script>
  document.getElementById('cy').textContent = new Date().getFullYear();

  const APPLE_LOGO = `<svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="flex-shrink:0"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>`;
  const GOOGLE_LOGO = `<img src="https://cdn.simpleicons.org/google/1a1916" width="14" height="14" alt="Google" style="flex-shrink:0;display:block" />`;
  const EXT_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11" style="margin-left:2px;opacity:0.5;flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

  const GOOGLE_SHORT_HOSTS = ['maps.app.goo.gl', 'goo.gl', 'g.co'];
  let pendingRedirectUrl = '';
  const inputEl = document.getElementById('input-url');
  const pasteBtn = document.querySelector('.paste-btn');

    debounceTimer = setTimeout(tryConvert, 380);

  function renderMapCards(appleUrl, googleUrl) {
    const container = document.getElementById('map-cards');
    container.innerHTML = '';

      { type: 'apple',  label: 'Apple Maps',  url: appleUrl  },

          <button class="map-card-btn" onclick="copyCard(this, '${escAttr(url)}')">Copy</button>

            Open
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

  function copyCard(btn, url) {
    navigator.clipboard.writeText(url).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
    });
  }

  function parseAppleUrl(url) {
    let params;
    try { params = new URL(url).searchParams; } catch(e) { throw new Error('Invalid URL.'); }
    const source = params.get('source') || params.get('saddr');
    const dest = params.get('destination') || params.get('daddr');
    if (!source || !dest) throw new Error('Could not find source or destination in the Apple Maps URL.');
    const waypoints = params.getAll('waypoint');
    let mode = params.get('mode') || 'driving';
    if (mode === 'r') mode = 'driving';
    if (mode === 'w') mode = 'walking';
    if (mode === 'c') mode = 'cycling';
    return { stops: [source, ...waypoints, dest], mode };
  }

  function parseGoogleUrl(url) {
    let u;
    try { u = new URL(url); } catch { throw new Error('Invalid Google Maps URL.'); }
    if (!u.pathname.includes('/maps/dir')) {
      throw new Error('Could not find route in the URL. Make sure it is a /dir/ link.');
    }

    const pathnameMatch = u.pathname.match(/\/maps\/dir\/([^?#]+)/);
    const segments = pathnameMatch
      ? pathnameMatch[1].split('/').map(s => decodeURIComponent(s.trim()))
      : [];

    let stops = segments.filter(s => {
      if (!s) return false;
      if (/^@/i.test(s)) return false;
      if (/^\d{1,2}z$/i.test(s)) return false;
      if (/^data=|^data!/i.test(s)) return false;
      if (s === 'dir' || s === 'maps') return false;
      return true;
    });

    // Query-style Google directions URLs: /maps/dir/?api=1&origin=...&destination=...&waypoints=...
    if (stops.length < 2) {
      const origin = u.searchParams.get('origin');
      const destination = u.searchParams.get('destination');
      const waypointRaw = u.searchParams.get('waypoints') || '';
      const waypointList = waypointRaw
        .split('|')
        .map(w => decodeURIComponent(w.trim()))
        .filter(Boolean);
      const queryStops = [origin, ...waypointList, destination].filter(Boolean);
      if (queryStops.length >= 2) stops = queryStops;
    }

    if (stops.length < 2) throw new Error('Found fewer than 2 stops. Make sure the URL includes route points.');
    let mode = 'driving';
    if (url.includes('!3e1')) mode = 'walking';
    else if (url.includes('!3e2')) mode = 'bicycling';
    else if (url.includes('!3e3')) mode = 'transit';
    else {
      const t = u.searchParams.get('travelmode');
      if (t === 'walking' || t === 'bicycling' || t === 'transit' || t === 'driving') mode = t;
    }
    stops = stops.map(cleanPlace);
    return { stops, mode };
  }

  function buildGoogleUrl(stops, mode) {
    const path = stops.map(s => encodeURIComponent(s)).join('/');
    return `https://www.google.com/maps/dir/${path}/?travelmode=${mode}`;
  }

  function buildAppleUrl(stops, mode) {
    const modeMap = { driving: 'r', walking: 'w', bicycling: 'c', transit: 'pt', cycling: 'c' };
    const appleMode = modeMap[mode] || 'r';
    const origin = stops[0];
    const dest = stops[stops.length - 1];
    const waypoints = stops.slice(1, -1);
    let url = `https://maps.apple.com/directions?source=${encodeURIComponent(origin)}&destination=${encodeURIComponent(dest)}&mode=${appleMode}`;
    waypoints.forEach(w => { url += `&waypoint=${encodeURIComponent(w)}`; });
    return url;
  }

  function cleanPlace(s) {
    return s.replace(/\+/g, ' ').trim();
  }

  function renderRoute(stops) {
    stops = stops.map(cleanPlace);
    const origin    = stops[0];
    const dest      = stops[stops.length - 1];
    const waypoints = stops.slice(1, -1);
    const rail      = document.getElementById('route-rail');
    rail.innerHTML  = '';

    const REMOVE_BTN = () => '';

    function makeRow(dotClass, label, name, idx, { showTop = false, showBottom = false, isLast = false, noBottomPad = false } = {}) {
      const row = document.createElement('div');
      row.className = 'rail-row';
      const contentClass = isLast ? ' last' : noBottomPad ? ' no-pad' : '';
      row.innerHTML = `
        <div class="rail-track">
          <div class="rail-line top${showTop ? '' : ' hidden'}"></div>
          <div class="rail-dot ${dotClass}"></div>
          <div class="rail-line bottom${showBottom ? '' : ' hidden'}"></div>
        </div>
        <div class="rail-content${contentClass}">
          <div class="rail-label">${label}</div>
          <div class="rail-name">${name}</div>
        </div>
        ${REMOVE_BTN(idx)}`;
      return row;
    }

    if (waypoints.length === 0) {
      // Simple: origin → dest
      rail.appendChild(makeRow('origin', 'From', origin, 0, { showBottom: true }));
      rail.appendChild(makeRow('dest',   'To',   dest,   1, { showTop: true, isLast: true }));
    } else if (waypoints.length === 1) {
      // Single waypoint: show all three rows, no collapse
      rail.appendChild(makeRow('origin', 'From', origin, 0, { showBottom: true }));
      const inner = document.createElement('div');
      inner.className = 'rail-row';
      inner.innerHTML = `
        <div class="rail-track">
          <div class="rail-line top"></div>
          <div class="rail-dot via"></div>
          <div class="rail-line bottom"></div>
        </div>
        <div class="rail-content">
          <div class="rail-name">${waypoints[0]}</div>
        </div>
        ${REMOVE_BTN(1)}`;
      rail.appendChild(inner);
      rail.appendChild(makeRow('dest', 'To', dest, 2, { showTop: true, isLast: true }));
    } else {
      // Multiple waypoints: origin, collapse pill, expandable waypoints, dest
      rail.appendChild(makeRow('origin', 'From', origin, 0, { showBottom: true, noBottomPad: true }));

      const n = waypoints.length;
      const pillRow = document.createElement('div');
      pillRow.className = 'rail-stops-row';
      pillRow.innerHTML = `
        <div class="rail-stops-track rail-track-node">
          <div class="rail-line top"></div>
          <div class="rail-node"></div>
          <div class="rail-line bottom"></div>
        </div>
        <button class="rail-stops-pill" id="stops-pill" onclick="toggleStops()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          <span id="stops-pill-label">${n} stop${n > 1 ? 's' : ''}</span>
        </button>`;
      rail.appendChild(pillRow);

      const waypointsEl = document.createElement('div');
      waypointsEl.className = 'rail-waypoints';
      waypointsEl.id = 'waypoints-detail';
      waypoints.forEach((wp, i) => {
        const inner = document.createElement('div');
        inner.className = 'rail-row';
        inner.innerHTML = `
          <div class="rail-track">
            <div class="rail-line top"></div>
            <div class="rail-dot via"></div>
            <div class="rail-line bottom"></div>
          </div>
          <div class="rail-content">
            <div class="rail-name">${wp}</div>
          </div>
          ${REMOVE_BTN(i + 1)}`;
        waypointsEl.appendChild(inner);
      });
      rail.appendChild(waypointsEl);

      rail.appendChild(makeRow('dest', 'To', dest, stops.length - 1, { showTop: true, isLast: true }));
    }
  }

  function toggleStops() {
    const pill   = document.getElementById('stops-pill');
    const detail = document.getElementById('waypoints-detail');
    if (!pill || !detail) return;
    const isOpen = detail.classList.contains('open');
    detail.classList.toggle('open', !isOpen);
    pill.classList.toggle('open', !isOpen);
    const n = detail.querySelectorAll('.rail-dot.via').length;
    document.getElementById('stops-pill-label').textContent =
      isOpen ? `${n} stop${n > 1 ? 's' : ''}` : 'Collapse';
  }

  function removeStop(index) {
    const wasOpen = !!document.getElementById('waypoints-detail')?.classList.contains('open');
    currentStops = currentStops.map(cleanPlace);
    currentStops.splice(index, 1);
    if (currentStops.length < 2) return;
    const appleUrl  = buildAppleUrl(currentStops, currentMode);
    const googleUrl = buildGoogleUrl(currentStops, currentMode);
    renderMapCards(appleUrl, googleUrl);
    renderRoute(currentStops);
    if (wasOpen) {
      const detail = document.getElementById('waypoints-detail');
      const pill   = document.getElementById('stops-pill');
      if (detail && pill) {
        detail.classList.add('open');
        pill.classList.add('open');
        const n = detail.querySelectorAll('.rail-dot.via').length;
        document.getElementById('stops-pill-label').textContent = 'Collapse';
      }
    }
    const routeTitle = `${currentStops[0]} to ${currentStops[currentStops.length - 1]}`;
    document.title = routeTitle;
    history.replaceState(null, '', `${location.pathname}?url=${encodeURIComponent(appleUrl)}`);
  }

  function renderOpenButtons(appleUrl, googleUrl) {
    const row = document.getElementById('open-row');
    row.innerHTML = `
      <a href="${escAttr(googleUrl)}" target="_blank" rel="noopener" class="open-btn">
        ${GOOGLE_LOGO} Open in Google Maps ${EXT_ICON}
      </a>
      <a href="${escAttr(appleUrl)}" target="_blank" rel="noopener" class="open-btn">
        ${APPLE_LOGO} Open in Apple Maps ${EXT_ICON}
      </a>`;
  }

  function escAttr(s) {
    return s.replace(/'/g, '%27').replace(/"/g, '&quot;');
  }

  function showOutput() {
    const el = document.getElementById('output-section');
    el.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));
  }

  function hideOutput() {
    const el = document.getElementById('output-section');
    el.classList.remove('visible');
    setTimeout(() => { if (!el.classList.contains('visible')) el.style.display = 'none'; }, 300);
  }
  function isGoogleMaps(url) {
    try {
      const u = new URL(url);
      const h = u.hostname.toLowerCase();
      return (h === 'google.com' || h.endsWith('.google.com')) && u.pathname.includes('/maps');
    } catch { return false; }
  }

  function isAppleHostname(hostname) {
    const h = (hostname || '').toLowerCase();
    return h === 'maps.apple.com' || h === 'maps.apple';
  }

  function isFullAppleMaps(url) {
    try {
      const u = new URL(url);
      return isAppleHostname(u.hostname) && (
        u.pathname.includes('directions') ||
        u.searchParams.has('source') ||
        u.searchParams.has('destination') ||
        u.searchParams.has('saddr') ||
        u.searchParams.has('daddr')
      );
    } catch { return false; }
  }

  function isAppleShortLink(url) {
    try { const u = new URL(url); return isAppleHostname(u.hostname) && !isFullAppleMaps(url); } catch { return false; }
  }

  function isGoogleShortLink(url) {
    try {
      const h = new URL(url).hostname.toLowerCase();
      return GOOGLE_SHORT_HOSTS.some(domain => h === domain || h.endsWith('.' + domain));
    } catch { return false; }
  }

  function looksLikeUrl(s) {
    try {
      const u = new URL(s);
      return u.protocol === 'http:' || u.protocol === 'https:';
    } catch { return false; }
  }

  function normalizeEscapes(text) {
    return String(text || '')
      .replace(/\\u003d/gi, '=')
      .replace(/\\u0026/gi, '&')
      .replace(/\\u003f/gi, '?')
      .replace(/\\u002f/gi, '/')
      .replace(/\\\//g, '/')
      .replace(/&amp;/gi, '&');
  }

  function cleanExtractedUrl(raw) {
    return normalizeEscapes(raw)
      .replace(/[),.;]+$/g, '')
      .trim();
  }

  function findMapsUrlInText(text) {
    if (!text) return null;
    const cleaned = normalizeEscapes(text);
    const urls = cleaned.match(/https?:\/\/[^\s"'<>\\]+/ig) || [];
    for (const rawUrl of urls) {
      const url = cleanExtractedUrl(rawUrl);
      if (!url) continue;
      if (isGoogleMaps(url) || isFullAppleMaps(url)) return url;
    }
    return null;
  }

  function extractNestedMapsUrl(value, depth = 0) {
    if (!value || depth > 6) return null;
    const candidate = cleanExtractedUrl(value);
    if (!candidate) return null;
    if (isGoogleMaps(candidate) || isFullAppleMaps(candidate)) return candidate;

    try {
      const decoded = cleanExtractedUrl(decodeURIComponent(candidate));
      if (decoded !== candidate) {
        const nestedDecoded = extractNestedMapsUrl(decoded, depth + 1);
        if (nestedDecoded) return nestedDecoded;
      }
    } catch {}

    try {
      const u = new URL(candidate);
      const keys = ['url', 'link', 'deep_link_id', 'target', 'redirect', 'dest', 'destination'];
      for (const key of keys) {
        const nestedValue = u.searchParams.get(key);
        if (!nestedValue) continue;
        const nested = extractNestedMapsUrl(nestedValue, depth + 1);
        if (nested) return nested;
      }
    } catch {}

    return findMapsUrlInText(candidate);
  }

  function hideRedirectBox() { setRedirectLoading(false); }

  function setRedirectLoading(isLoading) {
    const spin = document.getElementById('input-corner-spinner');
    if (spin) spin.classList.toggle('visible', !!isLoading);
  }

  function withDebugParam(raw) {
    try {
      const u = new URL(raw);
      if (!u.searchParams.has('d')) u.searchParams.set('d', '1');
      return u.toString();
    } catch {
      return raw;
    }
  }

  async function fetchWithTimeout(url, options = {}, timeoutMs = 12000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      return await fetch(url, { ...options, signal: controller.signal });
    } finally {
      clearTimeout(timer);
    }
  }

  async function resolveViaCodeTabs(raw) {
    const targets = [raw];
    if (isGoogleShortLink(raw)) targets.push(withDebugParam(raw));
    for (const target of targets) {
      try {
        const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(target)}`;
        const res = await fetchWithTimeout(proxyUrl, {}, 15000);
        if (!res.ok) continue;
        const text = await res.text().catch(() => '');
        const fromText = extractNestedMapsUrl(text);
        if (fromText) return fromText;
      } catch {}
    }
    return null;
  }

  async function resolveViaDirectFetch(raw) {
    const targets = [raw];
    if (isGoogleShortLink(raw)) targets.push(withDebugParam(raw));

    for (const target of targets) {
      // Try normal CORS fetch first (works only when target allows CORS).
      try {
        const res = await fetchWithTimeout(target, { redirect: 'follow' }, 12000);
        const fromUrl = extractNestedMapsUrl(res.url || '');
        if (fromUrl) return fromUrl;
        const text = await res.text().catch(() => '');
        const fromText = extractNestedMapsUrl(text);
        if (fromText) return fromText;
      } catch {}

      // no-cors fallback: opaque response may still surface final response.url in some browsers.
      try {
        const res = await fetchWithTimeout(target, { redirect: 'follow', mode: 'no-cors' }, 12000);
        const fromOpaqueUrl = extractNestedMapsUrl(res.url || '');
        if (fromOpaqueUrl) return fromOpaqueUrl;
      } catch {}
    }

    return null;
  }

  async function autoFollowRedirect(raw, { manual = false } = {}) {
    pendingRedirectUrl = raw;
    hideError();
    hideOutput();
    setRedirectLoading(true);

    const direct = extractNestedMapsUrl(raw);
    if (direct) {
      inputEl.value = direct;
      tryConvert();
      return;
    }

    const resolvers = [resolveViaCodeTabs, resolveViaDirectFetch];
    for (const resolve of resolvers) {
      try {
        const finalUrl = await resolve(raw);
        if (finalUrl) {
          hideRedirectBox();
          setRedirectLoading(false);
          inputEl.value = finalUrl;
          tryConvert();
          return;
        }
      } catch {}
    }

    setRedirectLoading(false);
    showError('No route detected from this link.');
  }

  function tryConvert() {
    hideError();
    hideRedirectBox();
    const raw = inputEl.value.trim();
    if (!raw) { hideOutput(); return; }

    // Type 5: any URL with a ?url= param — extract and recurse
    try {
      const inner = new URL(raw).searchParams.get('url');
      if (inner) { inputEl.value = inner; tryConvert(); return; }
    } catch {}

    // Type 4: maps.app.goo.gl short link → follow redirect
    if (isGoogleShortLink(raw)) { autoFollowRedirect(raw); return; }

    // Type 3: maps.apple.com share/short link (not a full directions URL) → follow redirect
    if (isAppleShortLink(raw)) { autoFollowRedirect(raw); return; }

    // Type 1: Regular Google Maps  /  Type 2: Regular Apple Maps (full directions URL)
    const isApple  = isFullAppleMaps(raw);
    const isGoogle = isGoogleMaps(raw);
    if (!isApple && !isGoogle) {
      if (looksLikeUrl(raw)) {
        pendingRedirectUrl = raw;
        setRedirectLoading(true);
        autoFollowRedirect(raw);
      }
      return;
    }

    const sourceType = isApple ? 'apple' : 'google';

    try {
      let parsed, appleUrl, googleUrl, outputUrl, outputType;
      if (isApple) {
        parsed    = parseAppleUrl(raw);
        googleUrl = buildGoogleUrl(parsed.stops, parsed.mode);
        appleUrl  = raw;
        outputUrl = googleUrl;
        outputType = 'google';
      } else {
        parsed    = parseGoogleUrl(raw);
        appleUrl  = buildAppleUrl(parsed.stops, parsed.mode);
        googleUrl = raw;
        outputUrl = appleUrl;
        outputType = 'apple';
      }

      currentStops = parsed.stops;
      currentMode  = parsed.mode;
      renderMapCards(appleUrl, googleUrl);
      renderRoute(parsed.stops);
      const stops = parsed.stops;
      const routeTitle = stops.length >= 2 ? `${cleanPlace(stops[0])} to ${cleanPlace(stops[stops.length - 1])}` : 'Maps URL Converter';
      document.title = routeTitle;
      let ogTitle = document.querySelector('meta[property="og:title"]');
      if (!ogTitle) { ogTitle = document.createElement('meta'); ogTitle.setAttribute('property', 'og:title'); document.head.appendChild(ogTitle); }
      ogTitle.setAttribute('content', routeTitle);
      let ogDesc = document.querySelector('meta[property="og:description"]');
      if (!ogDesc) { ogDesc = document.createElement('meta'); ogDesc.setAttribute('property', 'og:description'); document.head.appendChild(ogDesc); }
      ogDesc.setAttribute('content', 'Open in Apple Maps or Google Maps');
      history.replaceState(null, '', `${location.pathname}?url=${encodeURIComponent(raw)}`);
      document.querySelector('.input-wrap').style.display = 'none';
      showOutput();
    } catch(e) {
      showError(e.message);
    }
  }


  function shareRoute() {
    const raw = inputEl.value.trim();
    if (!raw) return;
    const shareUrl = `${location.origin}${location.pathname}?url=${encodeURIComponent(raw)}&shared=true`;
    const btn = document.getElementById('share-btn');
    const title = currentStops.length >= 2
      ? `${cleanPlace(currentStops[0])} to ${cleanPlace(currentStops[currentStops.length - 1])}`
      : 'Shared Maps route';
    const shareText = `${title}\n${shareUrl}`;
    const orig = btn.innerHTML;

    const markCopied = (label) => {
      btn.textContent = label;
      btn.classList.add('copied');
      setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
    };

    (async () => {
      try {
        if (navigator.share) {
          await navigator.share({
            title,
            text: title,
            url: shareUrl
          });
          markCopied('Shared!');
          return;
        }
      } catch {}

      navigator.clipboard.writeText(shareText).then(() => {
        markCopied('Copied with title!');
      });
    })();
  }
</script>
