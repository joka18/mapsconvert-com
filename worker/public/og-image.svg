<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f0ede6"/>

  <!-- subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1.2" fill="#ddd9d0"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- card shadow -->
  <rect x="152" y="108" width="896" height="434" rx="40" fill="rgba(0,0,0,0.06)"/>
  <!-- card -->
  <rect x="148" y="100" width="896" height="430" rx="40" fill="white"/>

  <!-- Apple Maps pin (left) -->
  <g transform="translate(248,155)">
    <rect width="140" height="140" rx="32" fill="#e8f2ff"/>
    <path d="M70 22C50.1 22 34 38.1 34 58c0 24.9 36 70 36 70s36-45.1 36-70c0-19.9-16.1-36-36-36zm0 49a13 13 0 1 1 0-26 13 13 0 0 1 0 26z" fill="#3478F6"/>
  </g>

  <!-- Google Maps pin (right) -->
  <g transform="translate(814,155)">
    <rect width="140" height="140" rx="32" fill="#fde8e6"/>
    <path d="M70 22C50.1 22 34 38.1 34 58c0 24.9 36 70 36 70s36-45.1 36-70c0-19.9-16.1-36-36-36zm0 49a13 13 0 1 1 0-26 13 13 0 0 1 0 26z" fill="#EA4335"/>
  </g>

  <!-- center conversion badge -->
  <rect x="512" y="148" width="176" height="144" rx="36" fill="#1a1916"/>
  <!-- right arrow -->
  <path d="M546 204h108M630 188l24 16-24 16" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- left arrow -->
  <path d="M654 240H546m24-16-24 16 24 16" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- title -->
  <text x="600" y="376" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
        font-size="54" font-weight="700" letter-spacing="-1.5" fill="#1a1916">Maps URL Converter</text>

  <!-- subtitle -->
  <text x="600" y="436" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="400" fill="#7a7670">Convert directions between Apple Maps and Google Maps</text>

  <!-- domain pill -->
  <rect x="508" y="462" width="184" height="42" rx="21" fill="#f0ede6"/>
  <text x="600" y="489" text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="500" fill="#7a7670">sharedmap.link</text>
</svg>
