<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maps URL Converter</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Crect width='36' height='36' rx='10' fill='%231a1916'/%3E%3Cpath d='M18 8C14.13 8 11 11.13 11 15c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 18 12a2.5 2.5 0 0 1 0 5z' fill='white'/%3E%3Cpath d='M9 27l4-2 6 2 6-2 4 2' stroke='white' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round' opacity='0.5'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo-row">
    <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="36" height="36" rx="10" fill="#1a1916"/>
      <path d="M18 8C14.13 8 11 11.13 11 15c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 18 12a2.5 2.5 0 0 1 0 5z" fill="white"/>
      <path d="M9 27l4-2 6 2 6-2 4 2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    </svg>
    <h1>Maps URL Converter</h1>
  </div>
  <p class="subtitle">Convert directions links between Apple Maps and Google Maps</p>
</header>

<div class="card">
  <div class="shared-banner" id="shared-banner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    Someone shared this route with you
  </div>

  <div class="input-wrap">
    <div class="textarea-wrap">
      <textarea id="input-url" placeholder="Paste an Apple Maps or Google Maps directions link…"></textarea>
      <span class="input-corner-spinner" id="input-corner-spinner" aria-hidden="true"></span>
    </div>
    <button class="paste-btn" onclick="pasteFromClipboard()" title="Paste from clipboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="4" rx="1"/>
        <path d="M8 4H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>
      </svg>
      <span>Paste</span>
    </button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div id="output-section">
    <div class="route-rail" id="route-rail"></div>

    <hr class="divider" />

    <div class="map-cards" id="map-cards"></div>

    <div class="share-strip" style="margin-top:1rem">
      <span class="share-strip-label">Share this route with anyone</span>
      <button class="share-btn" id="share-btn" onclick="shareRoute()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Copy share link
      </button>
    </div>

    <button class="convert-another-btn" onclick="resetAll()">Convert a different link</button>
  </div>
</div>

<footer>
  &copy; <span id="cy"></span> Joseph Karlan
</footer>

<script type="module" src="script.js"></script>
</body>
</html>
